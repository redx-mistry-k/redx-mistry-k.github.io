<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f0e8;--card:#fffdf7;--ink:#2c2418;--ink-light:#7a6e5d;--accent:#c45d3e;--accent-hover:#a94e33;--border:#e0d8c8;--tag-bg:#eee7d8;--shadow:rgba(44,36,24,.06);--green:#4a8c5c;--green-light:#e8f2eb}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:999}

.lock-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.lock-screen.hidden{display:none}
.lock-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:380px;max-width:90vw;box-shadow:0 8px 40px rgba(44,36,24,.1);text-align:center}
.lock-icon{font-size:2.6rem;margin-bottom:10px;opacity:.65}
.lock-box h1{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;margin-bottom:4px}
.lock-box .subtitle{color:var(--ink-light);font-size:.85rem;margin-bottom:22px}
.lock-box input{font-family:'DM Sans',sans-serif;width:100%;padding:12px 16px;font-size:.95rem;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);color:var(--ink);text-align:center;letter-spacing:.12em;outline:none;transition:border-color .2s,box-shadow .2s;margin-bottom:10px}
.lock-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,93,62,.1)}
.lock-box input.shake{animation:shake .4s ease;border-color:var(--accent)}
.lock-error{color:var(--accent);font-size:.8rem;min-height:20px;margin-bottom:6px;font-weight:500}
.lock-box .setup-note{font-size:.78rem;color:var(--ink-light);margin-top:14px;line-height:1.5}

.app{display:none}.app.visible{display:block}
.container{max-width:720px;margin:0 auto;padding:40px 24px 80px}
header{text-align:center;margin-bottom:48px;animation:fadeIn .6s ease}
header h1{font-family:'Fraunces',serif;font-weight:700;font-size:2.6rem;letter-spacing:-.02em;margin-bottom:6px}
header p{color:var(--ink-light);font-size:.95rem}
.header-actions{display:flex;justify-content:center;gap:16px;margin-top:10px}
.link-btn{font-size:.78rem;color:var(--ink-light);cursor:pointer;transition:color .2s;background:none;border:none;font-family:'DM Sans',sans-serif;font-weight:500}
.link-btn:hover{color:var(--accent)}

.stats{display:flex;gap:1px;background:var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px;box-shadow:0 2px 12px var(--shadow);animation:slideUp .5s ease}
.stat{flex:1;background:var(--card);padding:18px 16px;text-align:center}
.stat-value{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1.2}
.stat-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-light);margin-top:2px}

.add-form{background:var(--card);border-radius:14px;padding:28px;margin-bottom:32px;box-shadow:0 2px 16px var(--shadow);border:1px solid var(--border);animation:slideUp .6s ease}
.add-form h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:500;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:12px;margin-bottom:14px}
.form-group{flex:1;display:flex;flex-direction:column}
.form-group label{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600}
input,textarea,select{font-family:'DM Sans',sans-serif;font-size:.92rem;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--ink);transition:border-color .2s,box-shadow .2s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,93,62,.1)}
textarea{resize:vertical;min-height:72px}

.btn{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;padding:12px 28px;border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;width:100%;margin-top:4px}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(196,93,62,.25)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-small{padding:5px 12px;font-size:.78rem;border-radius:6px}
.btn-delete{background:none;color:var(--ink-light);border:1px solid var(--border)}
.btn-delete:hover{background:#fef0ed;color:var(--accent);border-color:var(--accent)}
.btn-edit{background:none;color:var(--ink-light);border:1px solid var(--border)}
.btn-edit:hover{background:#eef5ff;color:#3b6fad;border-color:#3b6fad}
.entry-actions{display:flex;gap:6px}

.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;animation:slideUp .7s ease}
.filter-bar span{font-size:.82rem;color:var(--ink-light);font-weight:500}
.filter-chip{font-family:'DM Sans',sans-serif;font-size:.8rem;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--ink-light);cursor:pointer;transition:all .2s;font-weight:500}
.filter-chip:hover{border-color:var(--accent);color:var(--accent)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.entries-section h2{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:500}
.entry-card{background:var(--card);border-radius:12px;padding:22px 24px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 8px var(--shadow);transition:transform .15s,box-shadow .15s;animation:cardIn .4s ease}
.entry-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px var(--shadow)}
.entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.entry-date{font-family:'Fraunces',serif;font-size:1rem;font-weight:500}
.entry-hours{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;color:var(--accent);white-space:nowrap}
.entry-task{font-size:.95rem;margin-bottom:10px;line-height:1.55}
.entry-footer{display:flex;justify-content:space-between;align-items:center}
.entry-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:.72rem;padding:3px 10px;border-radius:12px;background:var(--tag-bg);color:var(--ink-light);font-weight:500;text-transform:lowercase}
.tag.completed{background:var(--green-light);color:var(--green)}
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-light);animation:fadeIn .6s ease}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.4}
.btn-export{background:none;color:var(--ink-light);border:1.5px solid var(--border);font-size:.78rem;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.btn-export:hover{border-color:var(--accent);color:var(--accent)}

.modal-overlay{position:fixed;inset:0;background:rgba(44,36,24,.3);display:flex;align-items:center;justify-content:center;z-index:1001;animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:14px;padding:32px;width:360px;max-width:90vw;box-shadow:0 8px 40px rgba(44,36,24,.15)}
.modal h3{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:500;margin-bottom:16px}
.modal input{width:100%;margin-bottom:10px}
.modal-actions{display:flex;gap:10px;margin-top:6px}
.modal-actions .btn{flex:1;padding:10px}
.btn-cancel{background:var(--bg);color:var(--ink-light);border:1.5px solid var(--border)}
.btn-cancel:hover{border-color:var(--ink-light)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@media(max-width:540px){header h1{font-size:2rem}.form-row{flex-direction:column;gap:10px}.container{padding:28px 16px 60px}.stat{padding:14px 10px}.stat-value{font-size:1.4rem}}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon" id="lockIcon">&#128274;</div>
    <h1 id="lockTitle">Saturday Log</h1>
    <p class="subtitle" id="lockSubtitle">Enter your password</p>
    <input type="password" id="lockPassword" placeholder="password" autocomplete="off">
    <input type="password" id="lockConfirm" placeholder="confirm password" autocomplete="off" style="display:none">
    <div class="lock-error" id="lockError"></div>
    <button class="btn btn-primary" id="lockBtn" onclick="handleLogin()">Unlock</button>
    <p class="setup-note" id="setupNote" style="display:none">First time here. Pick a password you'll remember.</p>
  </div>
</div>

<div class="app" id="app">
  <div class="container">
    <header>
      <h1>Saturday Log</h1>
      <p>Track the work you get done every Saturday</p>
      <div class="header-actions">
        <button class="link-btn" onclick="showChangePw()">Change password</button>
        <button class="link-btn" onclick="logout()">Lock</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat"><div class="stat-value" id="totalSats">0</div><div class="stat-label">Saturdays</div></div>
      <div class="stat"><div class="stat-value" id="totalHours">0</div><div class="stat-label">Total Hours</div></div>
      <div class="stat"><div class="stat-value" id="totalTasks">0</div><div class="stat-label">Tasks Done</div></div>
      <div class="stat"><div class="stat-value" id="streak">0</div><div class="stat-label">Week Streak</div></div>
    </div>

    <div class="add-form">
      <h2>&#9998; New Entry</h2>
      <div class="form-row">
        <div class="form-group"><label>Date (Saturday)</label><input type="date" id="entryDate"></div>
        <div class="form-group"><label>Hours Spent</label><input type="number" id="entryHours" min="0.25" max="24" step="0.25" placeholder="e.g. 3"></div>
      </div>
      <div class="form-group" style="margin-bottom:14px"><label>What did you work on?</label><textarea id="entryTask" placeholder="Built the landing page, fixed auth bug..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Category</label>
          <select id="entryCategory"><option value="coding">Coding</option><option value="design">Design</option><option value="writing">Writing</option><option value="learning">Learning</option><option value="admin">Admin</option><option value="other">Other</option></select>
        </div>
        <div class="form-group"><label>Status</label>
          <select id="entryStatus"><option value="completed">Completed</option><option value="in progress">In Progress</option></select>
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="addEntry()">Log It</button>
    </div>

    <div class="filter-bar">
      <span>Show:</span>
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="coding">Coding</button>
      <button class="filter-chip" data-filter="design">Design</button>
      <button class="filter-chip" data-filter="writing">Writing</button>
      <button class="filter-chip" data-filter="learning">Learning</button>
      <button class="filter-chip" data-filter="admin">Admin</button>
      <button class="filter-chip" data-filter="other">Other</button>
    </div>

    <div class="entries-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>Your Saturdays</h2>
        <button class="btn-export" onclick="exportData()">Export CSV</button>
      </div>
      <div id="entriesList"></div>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="changePwModal">
  <div class="modal">
    <h3>Change Password</h3>
    <input type="password" id="cpOld" placeholder="Current password">
    <input type="password" id="cpNew" placeholder="New password">
    <div class="lock-error" id="cpError"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="hideChangePw()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" onclick="changePassword()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="editModal">
  <div class="modal" style="width:420px">
    <h3>Edit Entry</h3>
    <input type="hidden" id="editId">
    <div style="display:flex;gap:12px;margin-bottom:10px">
      <div style="flex:1;display:flex;flex-direction:column">
        <label style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600">Date</label>
        <input type="date" id="editDate">
      </div>
      <div style="flex:1;display:flex;flex-direction:column">
        <label style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600">Hours</label>
        <input type="number" id="editHours" min="0.25" max="24" step="0.25">
      </div>
    </div>
    <div style="margin-bottom:10px;display:flex;flex-direction:column">
      <label style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600">Task</label>
      <textarea id="editTask" style="min-height:60px"></textarea>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:10px">
      <div style="flex:1;display:flex;flex-direction:column">
        <label style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600">Category</label>
        <select id="editCategory"><option value="coding">Coding</option><option value="design">Design</option><option value="writing">Writing</option><option value="learning">Learning</option><option value="admin">Admin</option><option value="other">Other</option></select>
      </div>
      <div style="flex:1;display:flex;flex-direction:column">
        <label style="font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-light);margin-bottom:6px;font-weight:600">Status</label>
        <select id="editStatus"><option value="completed">Completed</option><option value="in progress">In Progress</option></select>
      </div>
    </div>
    <div class="lock-error" id="editError"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="hideEdit()">Cancel</button>
      <button class="btn btn-primary" style="width:auto" id="editSaveBtn" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://st.vkrishnaanand.workers.dev';

let token = null;
let entries = [];
let activeFilter = 'all';

function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(WORKER_URL + path, { ...opts, headers });
}

async function checkSetup() {
  try {
    const res = await api('/api/has-password');
    const data = await res.json();
    if (!data.hasPassword) {
      document.getElementById('lockIcon').innerHTML = '&#128075;';
      document.getElementById('lockTitle').textContent = 'Welcome';
      document.getElementById('lockSubtitle').textContent = 'Set up your password';
      document.getElementById('lockConfirm').style.display = '';
      document.getElementById('lockBtn').textContent = 'Create & Enter';
      document.getElementById('setupNote').style.display = '';
    }
  } catch (e) {
    document.getElementById('lockError').textContent = 'Cannot reach server. Check WORKER_URL.';
  }
}

async function handleLogin() {
  const pw = document.getElementById('lockPassword').value;
  const confirm = document.getElementById('lockConfirm');
  const errEl = document.getElementById('lockError');
  const btn = document.getElementById('lockBtn');

  if (!pw) { errEl.textContent = 'Type a password.'; return; }

  if (confirm.style.display !== 'none') {
    if (pw !== confirm.value) {
      errEl.textContent = "Passwords don't match.";
      confirm.classList.add('shake');
      setTimeout(() => confirm.classList.remove('shake'), 400);
      return;
    }
    btn.disabled = true; btn.textContent = 'Setting up...';
    try {
      const res = await api('/api/setup', { method: 'POST', body: JSON.stringify({ password: pw }) });
      const data = await res.json();
      btn.disabled = false;
      if (data.ok) { token = data.token; unlock(); }
      else { errEl.textContent = data.error; btn.textContent = 'Create & Enter'; }
    } catch { btn.disabled = false; errEl.textContent = 'Network error'; btn.textContent = 'Create & Enter'; }
    return;
  }

  btn.disabled = true; btn.textContent = 'Checking...';
  try {
    const res = await api('/api/login', { method: 'POST', body: JSON.stringify({ password: pw }) });
    const data = await res.json();
    btn.disabled = false; btn.textContent = 'Unlock';
    if (data.ok) { token = data.token; unlock(); }
    else {
      errEl.textContent = 'Wrong password.';
      document.getElementById('lockPassword').classList.add('shake');
      setTimeout(() => document.getElementById('lockPassword').classList.remove('shake'), 400);
    }
  } catch { btn.disabled = false; btn.textContent = 'Unlock'; errEl.textContent = 'Network error'; }
}

document.getElementById('lockPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('lockConfirm').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

function unlock() {
  document.getElementById('lockScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  loadEntries();
}

function logout() {
  token = null;
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('lockPassword').value = '';
  document.getElementById('lockError').textContent = '';
}

async function loadEntries() {
  const res = await api('/api/entries');
  const data = await res.json();
  entries = data.entries || [];
  render();
}

function getLastSaturday() {
  const d = new Date();
  d.setDate(d.getDate() - ((d.getDay() + 1) % 7));
  return d.toISOString().split('T')[0];
}
document.getElementById('entryDate').value = getLastSaturday();

document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  });
});

async function addEntry() {
  const date = document.getElementById('entryDate').value;
  const hours = parseFloat(document.getElementById('entryHours').value);
  const task = document.getElementById('entryTask').value.trim();
  const category = document.getElementById('entryCategory').value;
  const status = document.getElementById('entryStatus').value;

  if (!date) return alert('Pick a date.');
  if (!hours || hours <= 0) return alert('How many hours?');
  if (!task) return alert('What did you work on?');

  const dayOfWeek = new Date(date + 'T12:00:00').getDay();
  if (dayOfWeek !== 6 && !confirm("That's not a Saturday. Log it anyway?")) return;

  const btn = document.getElementById('addBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const res = await api('/api/entries', { method: 'POST', body: JSON.stringify({ entry: { date, hours, task, category, status } }) });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Log It';

  if (data.ok) {
    document.getElementById('entryHours').value = '';
    document.getElementById('entryTask').value = '';
    await loadEntries();
  } else { alert(data.error || 'Failed to save'); }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  await api('/api/entries/' + id, { method: 'DELETE' });
  await loadEntries();
}

function calcStreak() {
  if (!entries.length) return 0;
  const sats = [...new Set(entries.map(e => e.date))].sort().reverse();
  let s = 1;
  for (let i = 0; i < sats.length - 1; i++) {
    const diff = (new Date(sats[i] + 'T12:00:00') - new Date(sats[i + 1] + 'T12:00:00')) / 864e5;
    if (diff === 7) s++; else break;
  }
  return s;
}

function formatDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function render() {
  document.getElementById('totalSats').textContent = new Set(entries.map(e => e.date)).size;
  document.getElementById('totalHours').textContent = entries.reduce((s, e) => s + e.hours, 0);
  document.getElementById('totalTasks').textContent = entries.filter(e => e.status === 'completed').length;
  document.getElementById('streak').textContent = calcStreak();

  const list = document.getElementById('entriesList');
  const filtered = activeFilter === 'all' ? entries : entries.filter(e => e.category === activeFilter);

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#128221;</div><p>' +
      (activeFilter === 'all' ? 'No entries yet. Log your first Saturday!' : 'Nothing here yet.') + '</p></div>';
    return;
  }

  list.innerHTML = filtered.map(e =>
    '<div class="entry-card"><div class="entry-header"><div class="entry-date">' + formatDate(e.date) +
    '</div><div class="entry-hours">' + e.hours + 'h</div></div><div class="entry-task">' + esc(e.task) +
    '</div><div class="entry-footer"><div class="entry-tags"><span class="tag">' + e.category +
    '</span><span class="tag ' + (e.status === 'completed' ? 'completed' : '') + '">' + e.status +
    '</span></div><div class="entry-actions"><button class="btn btn-small btn-edit" onclick="showEdit(' + e.id + ')">Edit</button><button class="btn btn-small btn-delete" onclick="deleteEntry(' + e.id + ')">Delete</button></div></div></div>'
  ).join('');
}

function showEdit(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('editId').value = id;
  document.getElementById('editDate').value = e.date;
  document.getElementById('editHours').value = e.hours;
  document.getElementById('editTask').value = e.task;
  document.getElementById('editCategory').value = e.category;
  document.getElementById('editStatus').value = e.status;
  document.getElementById('editError').textContent = '';
  document.getElementById('editModal').classList.remove('hidden');
}

function hideEdit() { document.getElementById('editModal').classList.add('hidden'); }

async function saveEdit() {
  const id = parseInt(document.getElementById('editId').value);
  const date = document.getElementById('editDate').value;
  const hours = parseFloat(document.getElementById('editHours').value);
  const task = document.getElementById('editTask').value.trim();
  const category = document.getElementById('editCategory').value;
  const status = document.getElementById('editStatus').value;
  const errEl = document.getElementById('editError');

  if (!date) { errEl.textContent = 'Pick a date.'; return; }
  if (!hours || hours <= 0) { errEl.textContent = 'How many hours?'; return; }
  if (!task) { errEl.textContent = 'What did you work on?'; return; }

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true; btn.textContent = 'Saving...';
  const res = await api('/api/entries/' + id, { method: 'PUT', body: JSON.stringify({ entry: { date, hours, task, category, status } }) });
  const data = await res.json();
  btn.disabled = false; btn.textContent = 'Save';

  if (data.ok) { hideEdit(); await loadEntries(); }
  else { errEl.textContent = data.error || 'Failed to save'; }
}

function exportData() {
  if (!entries.length) return alert('Nothing to export.');
  const rows = [['Date','Hours','Task','Category','Status']];
  entries.forEach(e => rows.push([e.date, e.hours, '"' + e.task.replace(/"/g,'""') + '"', e.category, e.status]));
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([rows.map(r => r.join(',')).join('\n')], { type: 'text/csv' }));
  a.download = 'saturday_log.csv';
  a.click();
}

function showChangePw() { document.getElementById('changePwModal').classList.remove('hidden'); document.getElementById('cpOld').value = ''; document.getElementById('cpNew').value = ''; document.getElementById('cpError').textContent = ''; }
function hideChangePw() { document.getElementById('changePwModal').classList.add('hidden'); }

async function changePassword() {
  const old = document.getElementById('cpOld').value;
  const nw = document.getElementById('cpNew').value;
  const err = document.getElementById('cpError');
  if (!old || !nw) { err.textContent = 'Fill in both fields.'; return; }
  const res = await api('/api/change-password', { method: 'POST', body: JSON.stringify({ oldPassword: old, newPassword: nw }) });
  const data = await res.json();
  if (data.ok) { hideChangePw(); alert('Password changed!'); } else { err.textContent = data.error || 'Failed'; }
}

checkSetup();
</script>
