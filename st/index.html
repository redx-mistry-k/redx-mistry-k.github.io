<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Work Log</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --ink: #2c2418;
    --ink-light: #7a6e5d;
    --accent: #c45d3e;
    --accent-hover: #a94e33;
    --border: #e0d8c8;
    --tag-bg: #eee7d8;
    --shadow: rgba(44, 36, 24, 0.06);
    --green: #4a8c5c;
    --green-light: #e8f2eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeIn 0.6s ease;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 6px;
  }

  header p {
    color: var(--ink-light);
    font-size: 0.95rem;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
    box-shadow: 0 2px 12px var(--shadow);
    animation: slideUp 0.5s ease;
  }

  .stat {
    flex: 1;
    background: var(--card);
    padding: 18px 16px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-light);
    margin-top: 2px;
  }

  /* Add entry form */
  .add-form {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    margin-bottom: 32px;
    box-shadow: 0 2px 16px var(--shadow);
    border: 1px solid var(--border);
    animation: slideUp 0.6s ease;
  }

  .add-form h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }

  .form-group {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .form-group label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-light);
    margin-bottom: 6px;
    font-weight: 600;
  }

  input, textarea, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus, textarea:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(196, 93, 62, 0.1);
  }

  textarea {
    resize: vertical;
    min-height: 72px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    width: 100%;
    margin-top: 4px;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(196, 93, 62, 0.25);
  }

  .btn-small {
    padding: 5px 12px;
    font-size: 0.78rem;
    border-radius: 6px;
  }

  .btn-delete {
    background: none;
    color: var(--ink-light);
    border: 1px solid var(--border);
  }

  .btn-delete:hover {
    background: #fef0ed;
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
    animation: slideUp 0.7s ease;
  }

  .filter-bar span {
    font-size: 0.82rem;
    color: var(--ink-light);
    font-weight: 500;
  }

  .filter-chip {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* Entries list */
  .entries-section h2 {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 500;
    margin-bottom: 16px;
    animation: slideUp 0.7s ease;
  }

  .entry-card {
    background: var(--card);
    border-radius: 12px;
    padding: 22px 24px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 8px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s;
    animation: cardIn 0.4s ease;
  }

  .entry-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px var(--shadow);
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .entry-date {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 500;
  }

  .entry-hours {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent);
    white-space: nowrap;
  }

  .entry-task {
    font-size: 0.95rem;
    margin-bottom: 10px;
    line-height: 1.55;
  }

  .entry-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .entry-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.72rem;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--tag-bg);
    color: var(--ink-light);
    font-weight: 500;
    text-transform: lowercase;
  }

  .tag.completed {
    background: var(--green-light);
    color: var(--green);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
    animation: fadeIn 0.6s ease;
  }

  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.95rem;
  }

  /* Export button */
  .export-row {
    text-align: right;
    margin-bottom: 12px;
  }

  .btn-export {
    background: none;
    color: var(--ink-light);
    border: 1.5px solid var(--border);
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-export:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes cardIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 540px) {
    header h1 { font-size: 2rem; }
    .form-row { flex-direction: column; gap: 10px; }
    .container { padding: 28px 16px 60px; }
    .stat { padding: 14px 10px; }
    .stat-value { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Saturday Log</h1>
    <p>Track the work you get done every Saturday</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalSats">0</div>
      <div class="stat-label">Saturdays</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalHours">0</div>
      <div class="stat-label">Total Hours</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="totalTasks">0</div>
      <div class="stat-label">Tasks Done</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="streak">0</div>
      <div class="stat-label">Week Streak</div>
    </div>
  </div>

  <div class="add-form">
    <h2>&#9998; New Entry</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Date (Saturday)</label>
        <input type="date" id="entryDate">
      </div>
      <div class="form-group">
        <label>Hours Spent</label>
        <input type="number" id="entryHours" min="0.25" max="24" step="0.25" placeholder="e.g. 3">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>What did you work on?</label>
      <textarea id="entryTask" placeholder="Built the landing page, fixed auth bug..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="entryCategory">
          <option value="coding">Coding</option>
          <option value="design">Design</option>
          <option value="writing">Writing</option>
          <option value="learning">Learning</option>
          <option value="admin">Admin</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="entryStatus">
          <option value="completed">Completed</option>
          <option value="in progress">In Progress</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addEntry()">Log It</button>
  </div>

  <div class="filter-bar">
    <span>Show:</span>
    <button class="filter-chip active" data-filter="all">All</button>
    <button class="filter-chip" data-filter="coding">Coding</button>
    <button class="filter-chip" data-filter="design">Design</button>
    <button class="filter-chip" data-filter="writing">Writing</button>
    <button class="filter-chip" data-filter="learning">Learning</button>
    <button class="filter-chip" data-filter="admin">Admin</button>
    <button class="filter-chip" data-filter="other">Other</button>
  </div>

  <div class="entries-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2>Your Saturdays</h2>
      <button class="btn-export" onclick="exportData()">Export CSV</button>
    </div>
    <div id="entriesList"></div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'saturday_work_log';
  let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let activeFilter = 'all';

  // Default the date picker to the most recent Saturday
  function getLastSaturday() {
    const d = new Date();
    const day = d.getDay();
    const diff = day === 6 ? 0 : day + 1;
    d.setDate(d.getDate() - diff);
    return d.toISOString().split('T')[0];
  }

  document.getElementById('entryDate').value = getLastSaturday();

  // Filter chips
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      render();
    });
  });

  function addEntry() {
    const date = document.getElementById('entryDate').value;
    const hours = parseFloat(document.getElementById('entryHours').value);
    const task = document.getElementById('entryTask').value.trim();
    const category = document.getElementById('entryCategory').value;
    const status = document.getElementById('entryStatus').value;

    if (!date) return alert('Pick a date.');
    if (!hours || hours <= 0) return alert('How many hours?');
    if (!task) return alert('What did you work on?');

    // Check it's actually a Saturday
    const dayOfWeek = new Date(date + 'T12:00:00').getDay();
    if (dayOfWeek !== 6) {
      if (!confirm("That's not a Saturday. Log it anyway?")) return;
    }

    entries.push({
      id: Date.now(),
      date,
      hours,
      task,
      category,
      status,
    });

    entries.sort((a, b) => b.date.localeCompare(a.date));
    save();
    render();

    // Reset form
    document.getElementById('entryHours').value = '';
    document.getElementById('entryTask').value = '';
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function calcStreak() {
    if (entries.length === 0) return 0;
    const uniqueSats = [...new Set(entries.map(e => e.date))].sort().reverse();
    let streak = 1;
    for (let i = 0; i < uniqueSats.length - 1; i++) {
      const curr = new Date(uniqueSats[i] + 'T12:00:00');
      const prev = new Date(uniqueSats[i + 1] + 'T12:00:00');
      const diff = (curr - prev) / (1000 * 60 * 60 * 24);
      if (diff === 7) {
        streak++;
      } else {
        break;
      }
    }
    return streak;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function render() {
    // Stats
    const uniqueDates = new Set(entries.map(e => e.date));
    document.getElementById('totalSats').textContent = uniqueDates.size;
    document.getElementById('totalHours').textContent = entries.reduce((s, e) => s + e.hours, 0);
    document.getElementById('totalTasks').textContent = entries.filter(e => e.status === 'completed').length;
    document.getElementById('streak').textContent = calcStreak();

    // Entries
    const list = document.getElementById('entriesList');
    const filtered = activeFilter === 'all' ? entries : entries.filter(e => e.category === activeFilter);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#128221;</div>
          <p>${activeFilter === 'all' ? "No entries yet. Log your first Saturday!" : "Nothing in this category yet."}</p>
        </div>
      `;
      return;
    }

    list.innerHTML = filtered.map(e => `
      <div class="entry-card">
        <div class="entry-header">
          <div class="entry-date">${formatDate(e.date)}</div>
          <div class="entry-hours">${e.hours}h</div>
        </div>
        <div class="entry-task">${escapeHtml(e.task)}</div>
        <div class="entry-footer">
          <div class="entry-tags">
            <span class="tag">${e.category}</span>
            <span class="tag ${e.status === 'completed' ? 'completed' : ''}">${e.status}</span>
          </div>
          <button class="btn btn-small btn-delete" onclick="deleteEntry(${e.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function exportData() {
    if (entries.length === 0) return alert('Nothing to export yet.');
    const rows = [['Date', 'Hours', 'Task', 'Category', 'Status']];
    entries.forEach(e => rows.push([e.date, e.hours, `"${e.task.replace(/"/g, '""')}"`, e.category, e.status]));
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'saturday_work_log.csv';
    a.click();
  }

  render();
</script>

</body>
</html>
