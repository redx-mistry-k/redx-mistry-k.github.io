<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Tracker</title>

<style>

body{
font-family:system-ui;
background:#f4f6f9;
margin:0;
padding:30px;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
}

input,button,select{
width:100%;
padding:12px;
margin:8px 0;
font-size:15px;
box-sizing:border-box;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.summary{
font-size:15px;
margin-bottom:10px;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
margin:10px 0 20px 0;
}

.bar{
height:10px;
background:#2563eb;
border-radius:10px;
width:0%;
}

.payment{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.pending{
color:orange;
}

.confirmed{
color:green;
}

.linkbox{
font-size:13px;
background:#f1f1f1;
padding:10px;
border-radius:6px;
word-break:break-all;
}

</style>

</head>

<body>

<div class="container">

<h1>Payment Tracker</h1>

<div id="create">

<input id="total" placeholder="Total Amount">

<input id="password" placeholder="Session Password">

<input id="payerPin" placeholder="Payer PIN">

<input id="receiverPin" placeholder="Receiver PIN">

<select id="role">
<option value="payer">I am the Payer</option>
<option value="receiver">I am the Receiver</option>
</select>

<button onclick="createSession()">Create Session</button>

</div>


<div id="tracker" style="display:none">

<div class="summary" id="summary"></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div class="linkbox" id="sharelink"></div>

<div id="payerUI">

<h3>Add Payment</h3>

<input type="date" id="date">

<input placeholder="Amount Paid" id="amount">

<input placeholder="Payer PIN" id="pin">

<button onclick="addPayment()">Submit Payment</button>

</div>

<h3>Payment History</h3>

<div id="list"></div>

</div>

</div>


<script>

const API="https://ptwa.vkrishnaanand.workers.dev"

const params=new URLSearchParams(location.search)

let session=params.get("s")

if(session){
localStorage.setItem("session",session)
}else{
session=localStorage.getItem("session")
}

if(session){
document.getElementById("create").style.display="none"
document.getElementById("tracker").style.display="block"
load()
}

async function createSession(){

let total=document.getElementById("total").value
let password=document.getElementById("password").value
let payerPin=document.getElementById("payerPin").value
let receiverPin=document.getElementById("receiverPin").value
let role=document.getElementById("role").value

let r=await fetch(API+"/api/create",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
total,password,payerPin,receiverPin,role
})
})

let data=await r.json()

location="?s="+data.session

}



async function load(){

let r=await fetch(API+"/api/get?s="+session)

let data=await r.json()

let percent=(data.paid/data.total)*100

document.getElementById("summary").innerHTML=
`Total ₹${data.total} | Paid ₹${data.paid} | Remaining ₹${data.total-data.paid}`

document.getElementById("bar").style.width=percent+"%"

document.getElementById("sharelink").innerHTML=
`Session Link: ${location.origin}?s=${session}`

if(data.role==="receiver"){
document.getElementById("payerUI").style.display="none"
}

let html=""

data.payments.forEach((p,i)=>{

let actions=""

if(p.status==="pending" && data.role==="receiver"){

actions=`<button onclick="confirmPayment(${i})">Confirm</button>`

}

html+=`
<div class="payment">
<div>${p.date} ₹${p.amount}</div>
<div class="${p.status}">
${p.status}
</div>
${actions}
</div>
`

})

document.getElementById("list").innerHTML=html

}


async function addPayment(){

let date=document.getElementById("date").value
let amount=document.getElementById("amount").value
let pin=document.getElementById("pin").value

await fetch(API+"/api/add",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({session,date,amount,pin})
})

load()

}


async function confirmPayment(index){

let pin=prompt("Enter Receiver PIN")

await fetch(API+"/api/confirm",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({session,index,pin})
})

load()

}

</script>

</body>
</html>
