<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Payment Tracker</title>

<style>

body{
font-family:system-ui;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

input,button,select{
width:100%;
padding:12px;
margin:8px 0;
font-size:15px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.progress{
height:10px;
background:#eee;
border-radius:10px;
margin:10px 0;
}

.bar{
height:10px;
background:#2563eb;
border-radius:10px;
}

.payment{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<h2>Payment Tracker</h2>

<div id="create">

<input id="total" placeholder="Total Amount">

<input id="password" placeholder="Session Password">

<input id="payerPin" placeholder="Payer PIN">

<input id="receiverPin" placeholder="Receiver PIN">

<button onclick="createSession()">Create Session</button>

</div>


<div id="login" style="display:none">

<h3>Enter Session Password</h3>

<input id="loginPassword">

<button onclick="unlock()">Unlock</button>

</div>


<div id="roleSelect" style="display:none">

<h3>I am the</h3>

<button onclick="setRole('payer')">Payer</button>

<button onclick="setRole('receiver')">Receiver</button>

</div>


<div id="tracker" style="display:none">

<div id="summary"></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="payerUI">

<h3>Add Payment</h3>

<input type="date" id="date">

<input placeholder="Amount" id="amount">

<input placeholder="Payer PIN" id="pin">

<button onclick="addPayment()">Submit Payment</button>

</div>

<h3>Payments</h3>

<div id="list"></div>

</div>

</div>


<script>

const API="https://ptwa.vkrishnaanand.workers.dev"

const params=new URLSearchParams(location.search)

let session=params.get("s")

let role=null

if(session){

document.getElementById("create").style.display="none"
document.getElementById("login").style.display="block"

}



async function createSession(){

let total=document.getElementById("total").value
let password=document.getElementById("password").value
let payerPin=document.getElementById("payerPin").value
let receiverPin=document.getElementById("receiverPin").value

let r=await fetch(API+"/api/create",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
total,password,payerPin,receiverPin
})
})

let data=await r.json()

location="?s="+data.session

}



async function unlock(){

let password=document.getElementById("loginPassword").value

let r=await fetch(API+"/api/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
session,password
})
})

let data=await r.json()

if(data.error){
alert(data.error)
return
}

document.getElementById("login").style.display="none"
document.getElementById("roleSelect").style.display="block"

}



function setRole(r){

role=r

document.getElementById("roleSelect").style.display="none"
document.getElementById("tracker").style.display="block"

if(role==="receiver"){
document.getElementById("payerUI").style.display="none"
}

load()

}



async function load(){

let r=await fetch(API+"/api/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
session,
password:document.getElementById("loginPassword").value
})
})

let data=await r.json()

let percent=(data.paid/data.total)*100

document.getElementById("summary").innerHTML=
`Total ₹${data.total} | Paid ₹${data.paid} | Remaining ₹${data.total-data.paid}`

document.getElementById("bar").style.width=percent+"%"

let html=""

data.payments.forEach((p,i)=>{

let actions=""

if(p.status==="pending" && role==="receiver"){
actions=`<button onclick="confirmPayment(${i})">Confirm</button>`
}

html+=`
<div class="payment">
<div>${p.date} ₹${p.amount}</div>
<div>${p.status}</div>
${actions}
</div>
`
})

document.getElementById("list").innerHTML=html

}



async function addPayment(){

let date=document.getElementById("date").value
let amount=document.getElementById("amount").value
let pin=document.getElementById("pin").value

await fetch(API+"/api/add",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
session,date,amount,pin
})
})

load()

}



async function confirmPayment(index){

let pin=prompt("Receiver PIN")

await fetch(API+"/api/confirm",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
session,index,pin
})
})

load()

}

</script>

</body>
</html>
