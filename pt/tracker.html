<!DOCTYPE html>
<html>
<head>

<title>Tracker</title>

<style>

body{
font-family:Arial;
padding:40px;
}

input{
padding:8px;
margin:6px;
}

button{
padding:8px 15px;
}

</style>

</head>

<body>

<h2>Payment Tracker</h2>

<div id="summary"></div>

<hr>

<h3>Add Payment</h3>

<input type="date" id="date">

<input placeholder="Amount" id="amount">

<input placeholder="PIN" id="pin">

<button onclick="addPayment()">Submit</button>

<hr>

<h3>Payments</h3>

<div id="list"></div>

<script>

let session=localStorage.session

async function load(){

let res=await fetch("/api/get?session="+session)

let data=await res.json()

document.getElementById("summary").innerHTML=`
Total: ₹${data.total}<br>
Paid: ₹${data.paid}<br>
Remaining: ₹${data.total-data.paid}
`

let html=""

data.payments.forEach(p=>{
html+=p.date+" ₹"+p.amount+"<br>"
})

document.getElementById("list").innerHTML=html

}

async function addPayment(){

let date=document.getElementById("date").value
let amount=document.getElementById("amount").value
let pin=document.getElementById("pin").value

await fetch("/api/add",{
method:"POST",
body:JSON.stringify({
session,
date,
amount,
pin
})
})

load()

}

load()

</script>

</body>
</html>
